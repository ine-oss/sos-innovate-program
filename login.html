<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Technical School Login</title>
    <style>
        /* CSS STYLES */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #bcbcbc; /* Grey background from image */
            padding: 40px;
            border-radius: 4px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #3e3e8e;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .underline {
            color: #2b6cb0;
            text-decoration: underline;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .icon {
            position: absolute;
            left: 12px;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px; /* Space for the icon */
            border: 1px solid #999;
            border-radius: 4px;
            background-color: #e8e8e8;
            font-size: 14px;
            box-sizing: border-box; /* Ensures padding doesn't break width */
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background 0.3s;
        }

        .btn-primary {
            background-color: #2d32ce;
            color: white;
        }

        .btn-secondary {
            background-color: #5a5a5a;
            color: white;
        }

        .btn:hover {
            filter: brightness(1.2);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: #222;
        }

        .footer-text a {
            color: #2b6cb0;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>SOS Technical school</h1>
        <h2 class="underline">Application system</h2>

        <form action="#">
            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <span class="icon">✉</span>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" style="padding-left: 12px;" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>
            <button type="button" class="btn btn-secondary">Login as Admin</button>
        </form>

        <p class="footer-text">
            Don't have an account? <a href="#">Create Account</a>
        </p>
    </div>

</body>
</html>
